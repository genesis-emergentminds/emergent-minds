# Website Test Suite - CI/CD Pipeline
# 
# Axiom 5: Adversarial Resilience
# This workflow runs automatically on every push to ensure
# the website remains functional after all changes.
#
# Runs on: push to develop/main, pull requests, manual trigger
# Cost: Free for public repositories on GitHub Actions

name: Website Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:  # Manual trigger
    inputs:
      test_url:
        description: 'Base URL to test (default: production)'
        required: false
        default: 'https://www.emergentminds.org'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      fail-fast: false
      matrix:
        # Test against multiple browsers
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TEST_BASE_URL: ${{ github.event.inputs.test_url || 'https://www.emergentminds.org' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            tests/reports/
            test-results/
          retention-days: 30

  mobile-test:
    name: Mobile Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile viewport tests
        run: npx playwright test --project=mobile-chrome --project=mobile-safari
        env:
          TEST_BASE_URL: ${{ github.event.inputs.test_url || 'https://www.emergentminds.org' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-mobile
          path: |
            tests/reports/
            test-results/
          retention-days: 30

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, mobile-test]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.mobile-test.result }}" == "failure" ]; then
            echo "❌ Some tests failed. Review the artifacts for details."
            exit 1
          else
            echo "✅ All tests passed!"
          fi

      - name: Post summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop Tests | ${{ needs.test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile Tests | ${{ needs.mobile-test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested against: \`${{ github.event.inputs.test_url || 'https://www.emergentminds.org' }}\`" >> $GITHUB_STEP_SUMMARY
